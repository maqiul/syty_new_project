server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/syty?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: 6678722mm
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO / OSS 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: printer-resources
  url-prefix: http://localhost:9000/printer-resources

# 雪花算法配置 (每个实例需唯一)
snowflake:
  worker-id: 1
  datacenter-id: 1

logging:
  level:
    com.syty: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"


# MQTT 配置 (推送给 C# 客户端)
mqtt:
  broker-url: tcp://localhost:1883
  client-id: syty-backend-${random.uuid}
  username:
  password:
  default-qos: 1
  clean-session: true
  connection-timeout: 10
  keep-alive-interval: 60
  automatic-reconnect: true

# Sa-Token 配置
sa-token:
  # token 名称 (同时也是 cookie 名称)
  token-name: Authorization
  # token 有效期 (单位: 秒) 默认30天, -1 代表永不过期
  timeout: 86400
  # token 临时有效期 (指定时间内无操作就视为 token 过期)
  active-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: true
  # token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # 是否从 header 中读取 token
  is-read-header: true
  # 是否从 cookie 中读取 token
  is-read-cookie: false

# 打印素材存储配置 (V1.4)
print:
  assets:
    base-path: assets/print/
    url-prefix: /assets/print/

# 租户分库配置 (V1.6 扩展点预留)
tenant:
  sharding:
    enabled: false
